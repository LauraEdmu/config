# Exclude commonly ignored directories.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

line-length = 88
indent-width = 4

# Match this project's actual minimum supported Python version.
target-version = "py314"

[lint]
# Conservative default: syntax errors, common mistakes, unused imports/variables,
# and import sorting.
select = ["E4", "E7", "E9", "F", "I"]

# Moderately strict alternative:
# select = ["E", "F", "I", "UP", "B", "SIM"]
#
# E   = pycodestyle errors
# F   = Pyflakes
# I   = import sorting
# UP  = modernise code for the configured Python version
# B   = likely bugs and questionable constructs
# SIM = opportunities to simplify code

ignore = []
fixable = ["ALL"]
unfixable = []

dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
